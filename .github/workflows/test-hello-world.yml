name: Test Hello World

on:
  push:
    paths:
      - 'Osa 1/Osa 1.1 reactin alkeet/helloWorld/**'
  pull_request:
    paths:
      - 'Osa 1/Osa 1.1 reactin alkeet/helloWorld/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm install
      working-directory: Osa 1/Osa 1.1 reactin alkeet/helloWorld
    - name: Run tests
      run: npm test -- --run
      working-directory: Osa 1/Osa 1.1 reactin alkeet/helloWorld